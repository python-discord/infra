apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pydis-com
spec:
  secretName: pydis-com-tls
  dnsNames:
    - pydis.com
    - "*.pydis.com"
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "nginx-gateway"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "nginx-gateway"
