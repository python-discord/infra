groups:
- name: discord
  rules:

  - alert: discord/high-join-rate
    expr: deriv(bot_guild_total_members[30m]) * 3600 > 60
    for: 1m
    labels:
      severity: page
      additional_destination: mods
    annotations:
      summary: "High rate of guild member joins"
      description: "User join rate is {{ $value }} per hour, which may indicate a raid or other unusual activity."

  - alert: discord/experimental/membership-spike
    expr: |
      delta(bot_guild_total_members[5m]) > 50
    for: 1m
    labels:
      severity: page
    annotations:
      summary: "Sudden member spike detected"
      description: >
        Guild membership grew by more than 50 members in the last 5 minutes
        (current: {{ $value }} new members). Possible bot raid.

  - alert: discord/experimental/abnormal-join-rate
    expr: |
      deriv(bot_guild_total_members[15m]) * 60 > 10
    for: 10m
    labels:
      severity: page
    annotations:
      summary: "Abnormal sustained join rate"
      description: >
        Guild is gaining more than 10 members per minute, sustained for over
        10 minutes (rate: {{ $value | humanize }} members/min).

  - alert: discord/experimental/mass-user-drop
    expr: |
      delta(bot_guild_total_members[5m]) < -30
    for: 1m
    labels:
      severity: page
    annotations:
      summary: "Sudden member drop detected"
      description: >
        Guild membership dropped by more than 30 members in the last 5 minutes
        (lost: {{ $value }} members).

  - alert: discord/experimental/user-churn
    expr: |
      changes(bot_guild_total_members[10m]) > 20
    for: 5m
    labels:
      severity: page
    annotations:
      summary: "High member churn detected"
      description: >
        Combined join and leave activity exceeded 20 events in 10 minutes
        (churn score: {{ $value }}). Possible raid probing, selfbots, or
        coordinated join/leave cycles.
