apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quackstack
  namespace: apis
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
  hostnames:
    - quackstack.pythondiscord.com
  rules:
      - backendRefs:
        - name: quackstack
          weight: 1
          port: 80
