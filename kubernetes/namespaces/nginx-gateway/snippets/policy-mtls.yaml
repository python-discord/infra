apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsPolicy
metadata:
  name: nginx-gateway-mtls
  namespace: nginx-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: nginx
  snippets:
    - context: http.server
      value: |
        ssl_client_certificate /etc/nginx/mtls-ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 1;
