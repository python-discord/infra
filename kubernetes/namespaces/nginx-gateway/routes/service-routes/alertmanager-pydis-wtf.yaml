apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager-pydis-wtf
  namespace: nginx-gateway
spec:
  hostnames:
    - alertmanager.pydis.wtf
  parentRefs:
    - name: nginx
      namespace: nginx-gateway
  rules:
    - backendRefs:
      - name: alertmanager
        namespace: monitoring
        port: 9093
      filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.nginx.org
          kind: SnippetsFilter
          name: enforce-mtls
---
apiVersion: gateway.nginx.org/v1alpha1
kind: UpstreamSettingsPolicy
metadata:
  name: alertmanager-upstream-session-affinity
  namespace: monitoring
spec:
  targetRefs:
  - group: core
    kind: Service
    name: alertmanager
  loadBalancingMethod: "ip_hash"
