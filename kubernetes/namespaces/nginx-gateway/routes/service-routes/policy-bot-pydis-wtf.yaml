apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: policy-bot-pydis-wtf
  namespace: nginx-gateway
spec:
  hostnames:
    - policy-bot.pydis.wtf
  parentRefs:
    - name: nginx
      namespace: nginx-gateway
  rules:
    - backendRefs:
      - name: policy-bot
        namespace: tooling
        port: 80
      filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.nginx.org
          kind: SnippetsFilter
          name: enforce-mtls
