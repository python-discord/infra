apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paypal-redirect-pythondiscord-com
  namespace: nginx-gateway
spec:
  hostnames:
    - paypal.pythondiscord.com
  parentRefs:
    - name: nginx
      namespace: nginx-gateway
  rules:
    - filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.nginx.org
          kind: SnippetsFilter
          name: enforce-mtls
      - type: RequestRedirect
        requestRedirect:
          scheme: https
          hostname: www.paypal.com
          path:
            type: ReplaceFullPath
            replaceFullPath: /paypalme/pythondiscord
          statusCode: 302
