apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: welcome-pythondiscord-com
  namespace: nginx-gateway
spec:
  hostnames:
    - welcome.pythondiscord.com
  parentRefs:
    - name: nginx
      namespace: nginx-gateway
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - name: site
        namespace: web
        port: 80
      filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.nginx.org
          kind: SnippetsFilter
          name: welcome-proxy
