name: Prometheus alert deployment

on:
  push:
    branches:
      - main
    paths:
      - "kubernetes/namespaces/monitoring/alerts/**"
      - ".github/workflows/prometheus.yaml"

concurrency:
  group: prometheus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: azure/setup-kubectl@v5.0.0

      - name: Authenticate with Kubernetes
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy alerts
        run: |
          cd kubernetes/namespaces/monitoring/alerts && make
